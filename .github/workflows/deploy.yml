name: Build & Deploy Documentation
on:
  # Fired by the source repo on push or tag — see its
  # notify-docs.yml workflow. client_payload carries the triggering ref/sha.
  repository_dispatch:
    types: [source-updated]
  # Manual rebuild from the Actions tab.
  workflow_dispatch:

# Permissions for the GITHUB_TOKEN: deploy to Pages. Cloning the private source
# uses a separate fine-grained PAT (see "Check out source repository" below).
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments; never cancel an in-progress publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Source repo to build docs from. Update this single value at the eventual
# rename to cocoaorg/cocoa.
env:
  SOURCE_REPO: zcobell/cocoa

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check the source out at the workspace root so build_multiversion.sh
      # resolves $REPO_ROOT to it and its `git tag`/`git worktree` calls see the
      # full version history. fetch-depth: 0 + fetch-tags is required — the
      # multi-version loop iterates over every published tag.
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.client_payload.sha || 'main' }}
          token: ${{ secrets.COCOA_DOCS_SOURCE_READ_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build multi-version Sphinx documentation
        run: |
          cd docs/sphinx
          make multiversion

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/build/sphinx/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
